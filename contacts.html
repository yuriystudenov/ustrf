<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style/main.css">
  
  <title>ЮСТ.РФ - Контакты</title>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: white;
      min-height: 100vh;
    }
    
    .contacts-container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      margin: 0 auto;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
    }
    
    .contacts-card {
      background: white;
      border-radius: 30px;
      padding: 3rem 2rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .contacts-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #C63434, #FF8484);
    }
    
    .contacts-title {
      color: #C63434;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }
    
    .contacts-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: #C63434;
    }
    
    .contact-item {
      margin: 2rem 0;
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 15px;
      transition: transform 0.3s ease;
    }
    
    .contact-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    .contact-label {
      color: #666;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    
    .contact-value {
      color: #333;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0;
    }
    
    .contact-value a {
      color: #333;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #666;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    @media (max-width: 576px) {
      .contacts-container {
        padding: 1rem;
      }
      
      .contacts-card {
        padding: 2rem 1.5rem;
      }
      
      .contact-value {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

 <div class="container-fluid">
  <!-- Navigation -->

      <ul class="nav-menu header__list">

        <li><a href="category.html" class="header__link">Категории</a></li>
        <li><a href="delivery.html" class="header__link">Доставка</a></li>
        <li><a href="contacts.html" class="header__link">Контакты</a></li>
        <li><a href="garant.html" class="header__link">Гарантии и сервис</a></li>
        <li><a href="avtonomnaya-sistema-ust.xls" class="header__link">Расчёт системы</a></li>
        <li><a href="price ЮСТ.xlsx" class="header__link">Прайс лист</a></li>
      </ul>
    </nav>
  </div>
  </div>

  <div class="contacts-container">
    <div class="contacts-card">
      <h1 class="contacts-title">Контакты</h1>
      
      <div class="contact-item">
        <div class="contact-label">Телефон</div>
        <p class="contact-value">+7 (927) 375-05-17</p>
      </div>
      
      <div class="contact-item">
        <div class="contact-label">Email</div>
        <p class="contact-value">
          <a href="mailto:solar@ust.su">solar@ust.su</a>
        </p>
      </div>
      
      <a href="/" class="back-link">← Вернуться на главную</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
