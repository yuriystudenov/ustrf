  .video-container {

  width: 100%;
  height: 100vh; /* Высота экрана*/
}

.video-bg {
  position: absolute; /* Видео занимает все пространство контейнера*/
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover; /* Заполняет весь контейнер, обрезая, если нужно*/
  z-index: -1; /* Видео под контентом*/
}

.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex; /* Для выравнивания контента*/

  background: #000;
  z-index: 1; /* Над видео*/

}
