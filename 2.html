<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style/main.css">
  
  <title>ЮСТ.РФ - Система солнечных батарей</title>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fff;
      overflow: hidden;
    }
    
    .splash-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    
    .splash-content {
      text-align: center;
      animation: fadeIn 1s ease-in;
    }
    
    .splash-title {
      font-weight: 400;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #C63434;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .splash-subtitle {
      color: #666;
      font-size: 1.2rem;
      margin-bottom: 3rem;
    }
    
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      animation: bounce 2s infinite;
    }
    
    .scroll-indicator p {
      color: #C63434;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }
    
    .scroll-indicator .arrow {
      width: 30px;
      height: 30px;
      border-left: 2px solid #C63434;
      border-bottom: 2px solid #C63434;
      transform: rotate(-45deg);
      margin: 0 auto;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      40% {
        transform: translateX(-50%) translateY(-20px);
      }
      60% {
        transform: translateX(-50%) translateY(-10px);
      }
    }
    
    .brand-elements {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    
    .brand-element {
      width: 106px;
      height: 38px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      transition: transform 0.3s ease;
    }
    
    .brand-element:hover {
      transform: scale(1.1);
    }
    
    .brand-element.red {
      background-color: #C63434;
      transform: rotate(-24deg);
    }
    
    .brand-element.pink {
      background-color: #FF8484;
      transform: rotate(16deg);
    }
  </style>
</head>
<body>
  <div class="splash-screen">
    <div class="splash-content">
      <h1 class="splash-title">
        <span style="color: #C63434;">Система</span><br>солнечных батарей
      </h1>
      
      <p class="splash-subtitle">Энергия будущего уже сегодня</p>
      
      <div class="brand-elements">
        <span class="brand-element red">ЮСТ</span>
        <span class="brand-element pink">ЮСТ</span>
        <span class="brand-element red">ЮСТ</span>
        <span class="brand-element pink">ЮСТ</span>
        <span class="brand-element pink">ЮСТ</span>
        <span class="brand-element red">ЮСТ</span>
      </div>
    </div>
    
    <div class="scroll-indicator">
      <p>вниз</p>
      <div class="arrow"></div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  
  <script>
    // Автоматический переход на следующую страницу через 3 секунды
    setTimeout(function() { 
      window.location.href = '3.html'; 
    }, 3000);
  </script>
</body>
</html>
